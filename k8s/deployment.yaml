apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: devpod
  name: devpod
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: devpod
  strategy: {}
  template:
    metadata:
      labels:
        app: devpod
    spec:
      containers:
      - image: dev-pod:latest
        name: devpod
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 22
          protocol: TCP
        resources:
          limits:
            cpu: "2"
            memory: "2048Mi"
          requests:
            cpu: "1"
            memory: "1024Mi"
        env:
        - name: TZ
          value: Asia/Shanghai
        - name: NODE_VERSION
          value: "24.1.0"
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: devpod-secrets
              key: anthropic-api-key
              optional: true
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: devpod-secrets
              key: openai-api-key
              optional: true
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: devpod-secrets
              key: github-token
              optional: true
        - name: SHENGSUANYUN_API_KEY
          valueFrom:
            secretKeyRef:
              name: devpod-secrets
              key: shengsuanyun-api-key
              optional: true
        - name: SHENGSUANYUN_CP_API_KEY
          valueFrom:
            secretKeyRef:
              name: devpod-secrets
              key: shengsuanyun-cp-api-key
              optional: true
        - name: DEVPOD_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: devpod-secrets
              key: root-password
        - name: HTTP_PROXY
          value: ""
        - name: HTTPS_PROXY
          value: ""
        - name: NO_PROXY
          value: ""
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: ssh-config
          mountPath: /root/.ssh
        livenessProbe:
          exec:
            command:
            - pgrep
            - sshd
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
        readinessProbe:
          exec:
            command:
            - pgrep
            - sshd
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: workspace
        persistentVolumeClaim:
          claimName: devpod-workspace
      - name: ssh-config
        secret:
          secretName: devpod-ssh-key
          defaultMode: 0600
status: {}
