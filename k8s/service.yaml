apiVersion: v1
kind: Service
metadata:
  name: aidev-ssh
  namespace: default
spec:
  type: NodePort
  selector:
    app: aidev  # 必须与 Deployment 中的 label 匹配
  ports:
    - protocol: TCP
      port: 22       # Service 内部端口
      targetPort: 22 # 容器端口
      nodePort: 30022 # 宿主机/节点端口 (范围 30000-32767)
      